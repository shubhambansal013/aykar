syntax = "proto3";

package tax.sources.tis;

import "common/common.proto";

message TaxpayerInformationSummary {
  tax.common.DocumentMetadata metadata = 1; // Document tracking metadata
  tax.common.TaxpayerProfile profile = 2;   // Taxpayer identity block
  repeated SummaryCategory categories = 3;  // Category level aggregates
  repeated DetailedInformation details = 4; // Flat list of granular line items
}

message SummaryCategory {
  string category_name = 1;         // e.g., "Salary", "Interest from savings bank"
  double processed_by_system = 2;   // De-duplicated value processed by ITD
  double accepted_by_taxpayer = 3;  // Final value confirmed or updated by taxpayer
}

message DetailedInformation {
  string parent_category = 1;       // Links item to its SummaryCategory
  string part = 2;                  // "SFT", "TDS/TCS", "Other"
  string information_description = 3; // e.g., "Salary (TDS Annexure II)"
  string information_source = 4;     // e.g., Name of bank, employer
  string amount_description = 5;     // e.g., "Gross Salary Received", "Interest"
  double reported_by_source = 6;     // Raw value sent by reporting entity
  optional double processed_by_system = 7; // Nullable if not processed for summary
  optional double accepted_by_taxpayer = 8; // Nullable taxpayer confirmation feedback
}
